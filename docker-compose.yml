services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-change-this-local-key}
      LITELLM_MODEL: ${LITELLM_MODEL:-openai/local-main}
      LMSTUDIO_OPENAI_BASE_URL: ${LMSTUDIO_OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_API_KEY: ${LMSTUDIO_API_KEY:-lm-studio}
      DATABASE_URL: ${DATABASE_URL:-postgresql://litellm:litellm@postgres:5432/litellm}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
    volumes:
      - ./config/litellm.config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gateway

  queue-proxy:
    build:
      context: ./services/queue_proxy
    environment:
      SERVICE_NAME: queue-proxy
      QUEUE_PROXY_CONFIG_PATH: /app/config/orchestrator.yaml
      UPSTREAM_LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-change-this-local-key}
      QUEUE_PROXY_API_KEY: ${QUEUE_PROXY_API_KEY:-}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./config/orchestrator.yaml:/app/config/orchestrator.yaml:ro
    ports:
      - "4100:4100"
    depends_on:
      - litellm
    networks:
      - gateway

  healthcheck:
    build:
      context: ./services/healthcheck
    environment:
      SERVICE_NAME: healthcheck
      LITELLM_BASE_URL: http://queue-proxy:4100
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-change-this-local-key}
      PUBLIC_MODEL_NAME: ${PUBLIC_MODEL_NAME:-local-main}
      LMSTUDIO_OPENAI_BASE_URL: ${LMSTUDIO_OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      LMSTUDIO_API_KEY: ${LMSTUDIO_API_KEY:-lm-studio}
      LMSTUDIO_MODEL_ID: ${LMSTUDIO_MODEL_ID:-local-main}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
      ENABLE_LITELLM_PATH_CHECK: ${ENABLE_LITELLM_PATH_CHECK:-true}
      READINESS_PROMPT: "${READINESS_PROMPT:-Return exactly: ok}"
      READINESS_MAX_TOKENS: ${READINESS_MAX_TOKENS:-8}
      ENABLE_PROMPT_LOGGING: ${ENABLE_PROMPT_LOGGING:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - queue-proxy
    networks:
      - gateway

  gpu-inventory:
    build:
      context: ./services/gpu_inventory
    environment:
      GPU_INVENTORY_NVIDIA_SMI_PATH: ${GPU_INVENTORY_NVIDIA_SMI_PATH:-nvidia-smi}
      GPU_INVENTORY_FAKE_GPU_INVENTORY_JSON: ${GPU_INVENTORY_FAKE_GPU_INVENTORY_JSON:-}
      GPU_INVENTORY_COMMAND_TIMEOUT_SECONDS: ${GPU_INVENTORY_COMMAND_TIMEOUT_SECONDS:-5}
      GPU_INVENTORY_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "4200:4200"
    networks:
      - gateway

  lifecycle:
    build:
      context: ./services/lifecycle
    environment:
      LIFECYCLE_CONFIG_PATH: /app/config/orchestrator.yaml
      BACKEND_REGISTRY_PATH: /app/state/backend_registry.json
      GPU_INVENTORY_URL: http://gpu-inventory:4200
      LIFECYCLE_DRY_RUN: ${LIFECYCLE_DRY_RUN:-true}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./config/orchestrator.yaml:/app/config/orchestrator.yaml:ro
      - lifecycle_state:/app/state
    ports:
      - "4300:4300"
    depends_on:
      - gpu-inventory
    networks:
      - gateway

  fake-backend:
    profiles:
      - test
    build:
      context: ./services/fake_openai_backend
    environment:
      FAKE_OPENAI_MODEL_IDS: ${FAKE_OPENAI_MODEL_IDS:-local-main}
      FAKE_OPENAI_RESPONSE_TEXT: ${FAKE_OPENAI_RESPONSE_TEXT:-ok}
    ports:
      - "18080:18080"
    networks:
      - gateway

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - healthcheck
    networks:
      - gateway

  grafana:
    image: grafana/grafana-oss:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - gateway

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  lifecycle_state:

networks:
  gateway:
    driver: bridge
